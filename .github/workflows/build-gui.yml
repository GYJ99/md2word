name: Build and Package

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libc6-dev libgl1-mesa-dev xorg-dev pkg-config

      - name: Install Windows GUI deps
        if: runner.os == 'Windows'
        run: choco install mingw -y

      - name: Build CLI (CGO_ENABLED=0)
        run: |
          mkdir -p dist
          CGO_ENABLED=0 go build -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME:-dev}" \
            -o dist/md2word-cli ./cmd/md2word

      - name: Build GUI
        run: |
          mkdir -p dist
          go build -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME:-dev}" \
            -o dist/md2word-gui ./cmd/md2word-gui

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: md2word-${{ runner.os }}
          path: dist/*

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
