name: Build and Package GUI

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-package:
    name: Build and Package
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Install dependencies (Linux)
      if: matrix.platform == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc libc6-dev libgl1-mesa-dev xorg-dev

    - name: Install dependencies (Windows)
      if: matrix.platform == 'windows'
      run: |
        choco install mingw -y

    - name: Download Go dependencies
      run: go mod download

    - name: Install Fyne packaging tool
      run: go install fyne.io/fyne/v2/cmd/fyne@latest

    - name: Build CLI version
      run: go build -ldflags="-s -w" -o md2word-cli ./cmd/md2word

    - name: Build GUI version
      run: go build -ldflags="-s -w" -o md2word-gui ./cmd/md2word-gui

    - name: Create application icon
      run: |
        mkdir -p assets
        # 创建简单的占位图标
        echo "Creating placeholder icon for ${{ matrix.platform }}"

    - name: Package GUI application
      run: |
        mkdir -p dist
        fyne package -os ${{ matrix.platform }} -name "md2word" -appID com.md2word.app -appVersion 1.0.0 -src ./cmd/md2word-gui

    - name: Organize artifacts (Windows)
      if: matrix.platform == 'windows'
      run: |
        if (Test-Path "md2word.exe") { Move-Item "md2word.exe" "dist/md2word-windows.exe" }
      shell: pwsh

    - name: Organize artifacts (macOS)
      if: matrix.platform == 'macos'
      run: |
        if [ -d "md2word.app" ]; then mv md2word.app dist/md2word-macos.app; fi

    - name: Organize artifacts (Linux)
      if: matrix.platform == 'linux'
      run: |
        if [ -f "md2word.tar.xz" ]; then mv md2word.tar.xz dist/md2word-linux.tar.xz; fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: md2word-${{ matrix.platform }}
        path: |
          md2word-cli*
          dist/*

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-package
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      with:
        path: release-assets

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: release-assets/**/*
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}